name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Docker tag to publish
        required: true
        type: string
      push_latest:
        description: Also tag the image as latest
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  DOCKER_IMAGE: jaiir320/bulkdownload

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run Go tests
        run: go test ./...

      - name: Verify application build
        run: go build .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version_tag="${{ github.event.release.tag_name }}"
            push_latest="true"
          else
            version_tag="${{ inputs.tag }}"
            push_latest="${{ inputs.push_latest }}"
          fi

          {
            echo "version_tag=$version_tag"
            echo "push_latest=$push_latest"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Docker image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.version_tag }}
            type=raw,value=latest,enable=${{ steps.tags.outputs.push_latest == 'true' }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
